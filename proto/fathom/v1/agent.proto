syntax = "proto3";

package fathom.v1;

service RuntimeService {
  rpc CreateSession(CreateSessionRequest) returns (CreateSessionResponse);
  rpc ListSessions(ListSessionsRequest) returns (ListSessionsResponse);
  rpc EnqueueTrigger(EnqueueTriggerRequest) returns (EnqueueTriggerResponse);
  rpc AttachSessionEvents(AttachSessionEventsRequest) returns (stream SessionEvent);
  rpc ListExecutions(ListExecutionsRequest) returns (ListExecutionsResponse);
  rpc CancelExecution(CancelExecutionRequest) returns (CancelExecutionResponse);
  rpc GetUserProfile(GetUserProfileRequest) returns (GetUserProfileResponse);
  rpc UpsertUserProfile(UpsertUserProfileRequest) returns (UpsertUserProfileResponse);
  rpc GetAgentProfile(GetAgentProfileRequest) returns (GetAgentProfileResponse);
  rpc UpsertAgentProfile(UpsertAgentProfileRequest) returns (UpsertAgentProfileResponse);
}

enum ExecutionStatus {
  EXECUTION_STATUS_UNSPECIFIED = 0;
  EXECUTION_STATUS_PENDING = 1;
  EXECUTION_STATUS_RUNNING = 2;
  EXECUTION_STATUS_SUCCEEDED = 3;
  EXECUTION_STATUS_FAILED = 4;
  EXECUTION_STATUS_CANCELED = 5;
}

enum RefreshScope {
  REFRESH_SCOPE_UNSPECIFIED = 0;
  REFRESH_SCOPE_AGENT = 1;
  REFRESH_SCOPE_USER = 2;
  REFRESH_SCOPE_ALL = 3;
}

message AgentProfile {
  string agent_id = 1;
  string display_name = 2;
  string agents_md = 3;
  string soul_md = 4;
  string identity_md = 5;
  string guidelines_md = 6;
  string code_of_conduct_md = 7;
  string long_term_memory_md = 8;
  uint64 spec_version = 9;
  int64 updated_at_unix_ms = 10;
}

message UserProfile {
  string user_id = 1;
  string name = 2;
  string nickname = 3;
  string preferences_json = 4;
  string user_md = 5;
  string long_term_memory_md = 6;
  int64 updated_at_unix_ms = 7;
}

message Execution {
  string execution_id = 1;
  string session_id = 2;
  string action_id = 3;
  string args_json = 4;
  ExecutionStatus status = 5;
  string result_message = 6;
  int64 created_at_unix_ms = 7;
  int64 updated_at_unix_ms = 8;
}

message UserMessageTrigger {
  string user_id = 1;
  string text = 2;
}

enum ExecutionUpdateKind {
  EXECUTION_UPDATE_KIND_UNSPECIFIED = 0;
  EXECUTION_UPDATE_KIND_AWAITED_EXECUTION_SUCCEEDED = 1;
  EXECUTION_UPDATE_KIND_AWAITED_EXECUTION_FAILED = 2;
  EXECUTION_UPDATE_KIND_EXECUTION_DETACHED = 3;
  EXECUTION_UPDATE_KIND_DETACHED_EXECUTION_SUCCEEDED = 4;
  EXECUTION_UPDATE_KIND_DETACHED_EXECUTION_FAILED = 5;
  EXECUTION_UPDATE_KIND_EXECUTION_REJECTED = 6;
}

message ExecutionUpdateTrigger {
  string execution_id = 1;
  string action_id = 2;
  ExecutionUpdateKind kind = 3;
  string message = 4;
  string payload_message = 5;
}

message HeartbeatTrigger {}

message CronTrigger {
  string key = 1;
}

message RefreshProfileTrigger {
  RefreshScope scope = 1;
  string user_id = 2;
}

message Trigger {
  string trigger_id = 1;
  int64 created_at_unix_ms = 2;
  oneof kind {
    UserMessageTrigger user_message = 10;
    HeartbeatTrigger heartbeat = 12;
    CronTrigger cron = 13;
    RefreshProfileTrigger refresh_profile = 14;
    ExecutionUpdateTrigger execution_update = 15;
  }
}

message TriggerAcceptedEvent {
  Trigger trigger = 1;
  uint64 queue_depth = 2;
}

message TurnStartedEvent {
  uint64 turn_id = 1;
  uint64 trigger_count = 2;
}

message TurnEndedEvent {
  uint64 turn_id = 1;
  string reason = 2;
  uint64 history_size = 3;
}

message AssistantOutputEvent {
  string content = 1;
  string stream_id = 2;
}

message ExecutionStateChangedEvent {
  Execution execution = 1;
}

message ProfileRefreshedEvent {
  RefreshScope scope = 1;
  repeated string refreshed_user_ids = 2;
  uint64 agent_spec_version = 3;
}

enum SystemNoticeLevel {
  SYSTEM_NOTICE_LEVEL_UNSPECIFIED = 0;
  SYSTEM_NOTICE_LEVEL_INFO = 1;
  SYSTEM_NOTICE_LEVEL_WARNING = 2;
  SYSTEM_NOTICE_LEVEL_ERROR = 3;
}

message SystemNoticeEvent {
  SystemNoticeLevel level = 1;
  string code = 2;
  string message = 3;
}

enum ExecutionUpdatePhase {
  EXECUTION_UPDATE_PHASE_UNSPECIFIED = 0;
  EXECUTION_UPDATE_PHASE_ARGUMENTS_DELTA = 1;
  EXECUTION_UPDATE_PHASE_ARGUMENTS_READY = 2;
  EXECUTION_UPDATE_PHASE_AWAITED_EXECUTION_SUCCEEDED = 3;
  EXECUTION_UPDATE_PHASE_AWAITED_EXECUTION_FAILED = 4;
  EXECUTION_UPDATE_PHASE_EXECUTION_DETACHED = 5;
  EXECUTION_UPDATE_PHASE_DETACHED_EXECUTION_SUCCEEDED = 6;
  EXECUTION_UPDATE_PHASE_DETACHED_EXECUTION_FAILED = 7;
  EXECUTION_UPDATE_PHASE_EXECUTION_REJECTED = 8;
}

message ExecutionUpdateEvent {
  ExecutionUpdatePhase phase = 1;
  string call_key = 2;
  string call_id = 3;
  string action_id = 4;
  string execution_id = 5;
  string args_delta = 6;
  string args_json = 7;
  string detail = 8;
}

message AgentStreamEvent {
  string phase = 1;
  string detail = 2;
  int64 created_at_unix_ms = 3;
}

message AssistantStreamEvent {
  string stream_id = 1;
  string delta = 2;
  bool done = 3;
  int64 created_at_unix_ms = 4;
  string user_id = 5;
}

message TurnFailureEvent {
  uint64 turn_id = 1;
  string reason_code = 2;
  string message = 3;
}

message SessionEvent {
  string session_id = 1;
  int64 created_at_unix_ms = 2;
  oneof kind {
    TriggerAcceptedEvent trigger_accepted = 10;
    TurnStartedEvent turn_started = 11;
    TurnEndedEvent turn_ended = 12;
    AssistantOutputEvent assistant_output = 13;
    ExecutionStateChangedEvent execution_state_changed = 14;
    ProfileRefreshedEvent profile_refreshed = 15;
    AgentStreamEvent agent_stream = 16;
    TurnFailureEvent turn_failure = 17;
    AssistantStreamEvent assistant_stream = 18;
    SystemNoticeEvent system_notice = 19;
    ExecutionUpdateEvent execution_update = 20;
  }
}

message SessionSummary {
  string session_id = 1;
  int64 created_at_unix_ms = 2;
  string agent_id = 3;
  repeated string participant_user_ids = 4;
  AgentProfile agent_profile_copy = 5;
  repeated UserProfile participant_user_profiles_copy = 6;
  uint64 queued_trigger_count = 7;
  uint64 history_entry_count = 8;
  uint64 pending_execution_count = 9;
  uint64 running_execution_count = 10;
}

message CreateSessionRequest {
  string agent_id = 1;
  repeated string participant_user_ids = 2;
}

message CreateSessionResponse {
  SessionSummary session = 1;
}

message ListSessionsRequest {}

message ListSessionsResponse {
  repeated SessionSummary sessions = 1;
}

message EnqueueTriggerRequest {
  string session_id = 1;
  Trigger trigger = 2;
}

message EnqueueTriggerResponse {
  string trigger_id = 1;
  uint64 queue_depth = 2;
}

message AttachSessionEventsRequest {
  string session_id = 1;
}

message ListExecutionsRequest {
  string session_id = 1;
}

message ListExecutionsResponse {
  repeated Execution executions = 1;
}

message CancelExecutionRequest {
  string session_id = 1;
  string execution_id = 2;
}

message CancelExecutionResponse {
  bool canceled = 1;
  Execution execution = 2;
}

message GetUserProfileRequest {
  string user_id = 1;
}

message GetUserProfileResponse {
  UserProfile profile = 1;
}

message UpsertUserProfileRequest {
  UserProfile profile = 1;
}

message UpsertUserProfileResponse {
  UserProfile profile = 1;
}

message GetAgentProfileRequest {
  string agent_id = 1;
}

message GetAgentProfileResponse {
  AgentProfile profile = 1;
}

message UpsertAgentProfileRequest {
  AgentProfile profile = 1;
}

message UpsertAgentProfileResponse {
  AgentProfile profile = 1;
}
